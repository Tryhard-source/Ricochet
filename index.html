<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRICKFIRE — Main Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ember: #FF6B1A;
            --ember-dim: #c44e0e;
            --ember-glow: #ff9c5a;
            --dark: #0a0a0b;
            --dark2: #111214;
            --dark3: #181a1d;
            --surface: #1c1e22;
            --text: #e8ddd0;
            --text-dim: #7a6f64;
            --accent: #7B7BE8;
            --accent-dim: #5252bb;
            --teal: #329ea5;
        }

        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            cursor: crosshair;
        }

        /* ── STARFIELD ───────────────────────────────────────── */
        #starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: drift linear infinite;
            opacity: 0;
        }

        @keyframes drift {
            0%   { transform: translateY(0) translateX(0); opacity: 0; }
            5%   { opacity: var(--op); }
            95%  { opacity: var(--op); }
            100% { transform: translateY(calc(var(--dy) * 1px)) translateX(calc(var(--dx) * 1px)); opacity: 0; }
        }

        /* ember particles */
        .ember-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--ember);
            border-radius: 50%;
            animation: emberFloat linear infinite;
            opacity: 0;
            box-shadow: 0 0 6px var(--ember);
        }

        @keyframes emberFloat {
            0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            10%  { opacity: 0.9; }
            100% { transform: translateY(-120px) translateX(var(--ex)) scale(0); opacity: 0; }
        }

        /* ── SCANLINES ───────────────────────────────────────── */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
        }

        .vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
            pointer-events: none;
        }

        /* ── LAYOUT ──────────────────────────────────────────── */
        #app {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* ── PIXEL ART CANVAS ────────────────────────────────── */
        #pixel-art-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 160px;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        #pixel-canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* ── TITLE BLOCK ─────────────────────────────────────── */
        .title-block {
            text-align: center;
            margin-bottom: 60px;
            animation: titleReveal 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes titleReveal {
            from { opacity: 0; transform: translateY(-30px) skewX(-4deg); }
            to   { opacity: 1; transform: translateY(0) skewX(0deg); }
        }

        .game-subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 300;
            font-size: 0.75rem;
            letter-spacing: 0.5em;
            color: var(--ember);
            text-transform: uppercase;
            margin-bottom: 12px;
            animation: fadeIn 0.6s 0.3s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .game-title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: clamp(5rem, 12vw, 10rem);
            line-height: 0.88;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            position: relative;
            color: var(--text);
        }

        .game-title span {
            display: block;
        }

        .game-title .fire-word {
            color: var(--ember);
            text-shadow:
                0 0 20px rgba(255,107,26,0.6),
                0 0 60px rgba(255,107,26,0.3),
                0 0 100px rgba(255,107,26,0.15);
            animation: flickerTitle 4s ease-in-out infinite;
        }

        @keyframes flickerTitle {
            0%, 100% { text-shadow: 0 0 20px rgba(255,107,26,0.6), 0 0 60px rgba(255,107,26,0.3); }
            50%       { text-shadow: 0 0 30px rgba(255,107,26,0.9), 0 0 80px rgba(255,107,26,0.5), 0 0 120px rgba(255,107,26,0.2); }
        }

        .title-rule {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--ember), transparent);
            margin: 16px 0 8px;
            animation: expandRule 0.8s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
            transform-origin: center;
        }

        @keyframes expandRule {
            from { transform: scaleX(0); opacity: 0; }
            to   { transform: scaleX(1); opacity: 1; }
        }

        .game-tagline {
            font-size: 0.65rem;
            letter-spacing: 0.35em;
            color: var(--text-dim);
            text-transform: uppercase;
            animation: fadeIn 0.6s 0.8s both;
        }

        /* ── MENU ────────────────────────────────────────────── */
        .menu-wrap {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-start;
            animation: menuReveal 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes menuReveal {
            from { opacity: 0; transform: translateX(-20px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .menu-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 24px 10px 0;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-dim);
            transition: color 0.15s;
            border: none;
            background: none;
            outline: none;
            user-select: none;
        }

        .menu-item::before {
            content: '';
            width: 20px;
            height: 2px;
            background: var(--ember);
            transition: width 0.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s;
            opacity: 0;
            flex-shrink: 0;
        }

        .menu-item:hover,
        .menu-item.active {
            color: var(--text);
        }

        .menu-item:hover::before,
        .menu-item.active::before {
            opacity: 1;
            width: 28px;
        }

        .menu-item:hover .item-label,
        .menu-item.active .item-label {
            transform: translateX(0px);
        }

        .item-label {
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .menu-item .item-accent {
            font-size: 0.55rem;
            letter-spacing: 0.3em;
            color: var(--ember);
            font-family: 'Space Mono', monospace;
            font-weight: 400;
            opacity: 0;
            transition: opacity 0.2s;
            margin-left: 4px;
            align-self: center;
        }

        .menu-item:hover .item-accent {
            opacity: 1;
        }

        /* ── VERSION / INFO BAR ──────────────────────────────── */
        .info-bar {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 32px;
            z-index: 20;
            font-size: 0.55rem;
            letter-spacing: 0.3em;
            color: var(--text-dim);
            text-transform: uppercase;
            animation: fadeIn 0.6s 1.2s both;
        }

        /* ── DECORATIVE CORNERS ──────────────────────────────── */
        .corner {
            position: fixed;
            width: 40px;
            height: 40px;
            z-index: 20;
            opacity: 0.4;
            animation: fadeIn 1s 1s both;
        }
        .corner-tl { top: 20px; left: 20px; border-top: 1px solid var(--ember); border-left: 1px solid var(--ember); }
        .corner-tr { top: 20px; right: 20px; border-top: 1px solid var(--ember); border-right: 1px solid var(--ember); }
        .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--ember); border-left: 1px solid var(--ember); }
        .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--ember); border-right: 1px solid var(--ember); }

        /* ── CREDITS OVERLAY ─────────────────────────────────── */
        #credits-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        #credits-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .credits-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
        }

        .credits-panel {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--ember);
            padding: 48px 64px;
            max-width: 520px;
            width: 90%;
            box-shadow: 0 0 60px rgba(255,107,26,0.15), inset 0 0 40px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #credits-overlay.visible .credits-panel {
            transform: translateY(0);
        }

        .credits-eyebrow {
            font-size: 0.6rem;
            letter-spacing: 0.5em;
            color: var(--ember);
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .credits-title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 32px;
        }

        .credits-rule {
            height: 1px;
            background: linear-gradient(90deg, var(--ember), transparent);
            margin-bottom: 32px;
        }

        .credits-entry {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
        }

        .credits-role {
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .credits-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.08em;
            color: var(--text);
            text-transform: uppercase;
        }

        .credits-engine {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .credits-tech {
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .credits-tech-val {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            color: var(--accent);
            letter-spacing: 0.1em;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 1rem;
            transition: color 0.2s;
            background: none;
            border: none;
            outline: none;
        }

        .close-btn:hover { color: var(--ember); }

        /* ── PIXEL ART BOUNCE ────────────────────────────────── */
        @keyframes spriteWalk {
            from { background-position-x: 0px; }
            to   { background-position-x: -256px; }
        }

    </style>
</head>
<body>

<div id="starfield"></div>
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div id="pixel-art-container">
    <canvas id="pixel-canvas"></canvas>
</div>
<div id="app">
    <div class="title-block">
        <div class="game-subtitle">// A game by Tryhard</div>
        <h1 class="game-title">
            <!-- <span>BRICK</span> -->
            <!-- <span class="fire-word">REBOUND</span> -->
             <span style="display: flex;">RICO<span class="fire-word">CHET</span></span>
        </h1>
        <div class="title-rule"></div>
        <div class="game-tagline">Destroy everything &nbsp;·&nbsp; v0.1.0</div>
    </div>

    <nav class="menu-wrap">
        <button class="menu-item" id="btn-play">
            <span class="item-label">Play</span>
            <span class="item-accent">[ ENTER ]</span>
        </button>
        <button class="menu-item" id="btn-credits">
            <span class="item-label">Credits</span>
            <span class="item-accent">[ C ]</span>
        </button>
        <button class="menu-item" id="btn-quit">
            <span class="item-label">Quit</span>
            <span class="item-accent">[ ESC ]</span>
        </button>
    </nav>
</div>

<div class="info-bar">
    <span>Utility Based &nbsp;·&nbsp; Canvas2D</span>
    <span id="clock">--:--:--</span>
</div>

<div id="credits-overlay">
    <div class="credits-backdrop" id="credits-backdrop"></div>
    <div class="credits-panel">
        <button class="close-btn" id="close-credits">✕</button>
        <div class="credits-eyebrow">// CREDITS.TXT</div>
        <h2 class="credits-title">Developed By:</h2>
        <div class="credits-rule"></div>
        <div class="credits-entry">
            <span class="credits-role">Developer</span>
            <span class="credits-name">Tryhard</span>
        </div>
        <div class="credits-entry">
            <span class="credits-role">Game Design</span>
            <span class="credits-name">Tryhard</span>
        </div>
        <div class="credits-entry">
            <span class="credits-role">Art Direction</span>
            <span class="credits-name">Claude 🙏</span>
        </div>
        <div class="credits-entry">
            <span class="credits-role">Utility</span>
            <span class="credits-name">Canvas Utilities</span>
        </div>
        <div class="credits-engine">
            <div class="credits-tech">Built With</div>
            <div class="credits-tech-val">Vanilla JS · Canvas2D · HTML5</div>
        </div>
    </div>
</div>

<script>
function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
        now.toTimeString().slice(0,8);
}
setInterval(updateClock, 1000);
updateClock();

const sf = document.getElementById('starfield');
const W = window.innerWidth, H = window.innerHeight;

for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    const op = Math.random() * 0.6 + 0.1;
    const dur = Math.random() * 40 + 20;
    const dy = (Math.random() - 0.5) * 60;
    const dx = (Math.random() - 0.5) * 30;
    Object.assign(s.style, {
        width: size + 'px',
        height: size + 'px',
        left: Math.random() * 100 + '%',
        top: Math.random() * 100 + '%',
        '--op': op,
        '--dy': dy,
        '--dx': dx,
        animationDuration: dur + 's',
        animationDelay: -(Math.random() * dur) + 's',
    });
    sf.appendChild(s);
}

function spawnEmber() {
    const e = document.createElement('div');
    e.className = 'ember-particle';
    const ex = (Math.random() - 0.5) * 80;
    const dur = Math.random() * 2.5 + 1.5;
    Object.assign(e.style, {
        left: (20 + Math.random() * 60) + '%',
        bottom: (10 + Math.random() * 20) + '%',
        '--ex': ex + 'px',
        animationDuration: dur + 's',
        animationDelay: '0s',
    });
    sf.appendChild(e);
    setTimeout(() => e.remove(), dur * 1000);
}
setInterval(spawnEmber, 200);

const pc = document.getElementById('pixel-canvas');
const pctx = pc.getContext('2d');
const PAD = 0;
pc.width = W;
pc.height = 160;

const PX = 4;

const _ = null;
const O = '#FF6B1A';
const W2= '#e8ddd0';
const B = '#1c1e22';
const G = '#329ea5';
const K = '#7B7BE8';
const D = '#0a0a0b';
const R = '#c44e0e';

const frame1 = [
    [_,_,_,_,_,W2,W2,W2,W2,_,_,_,_,_,_,_],
    [_,_,_,_,W2,O, O, W2,W2,W2,_,_,_,_,_,_],
    [_,_,_,_,W2,O, W2,W2,O, W2,_,_,_,_,_,_],
    [_,_,_,_,_,W2,W2,W2,W2,_,_,_,_,_,_,_],
    [_,_,_,_,_,_,B, B, _,_,_,_,_,_,_,_],
    [_,_,_,_,_,B, B, B, B, _,_,_,_,_,_,_],
    [_,_,_,_,B, O, B, B, O, B, _,_,_,_,_,_],
    [_,_,_,_,B, O, B, B, B, B, _,_,_,_,_,_],
    [_,_,_,_,B, B, B, _,B, _,_,_,_,_,_,_],
    [_,_,_,_,_,B, _,_,_,B, _,_,_,_,_,_],
    [_,_,_,_,_,B, B, _,_,B, B, _,_,_,_,_],
    [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
];

const frame2 = [
    [_,_,_,_,_,W2,W2,W2,W2,_,_,_,_,_,_,_],
    [_,_,_,_,W2,O, O, W2,W2,W2,_,_,_,_,_,_],
    [_,_,_,_,W2,O, W2,W2,O, W2,_,_,_,_,_,_],
    [_,_,_,_,_,W2,W2,W2,W2,_,_,_,_,_,_,_],
    [_,_,_,_,_,_,B, B, _,_,_,_,_,_,_,_],
    [_,_,_,_,_,B, B, B, B, _,_,_,_,_,_,_],
    [_,_,_,_,B, O, B, B, O, B, _,_,_,_,_,_],
    [_,_,_,B, B, O, B, B, B, _,_,_,_,_,_,_],
    [_,_,_,B, B, B, B, _,_,_,_,_,_,_,_,_],
    [_,_,_,_,B, B, _,_,_,_,_,_,_,_,_,_],
    [_,_,_,_,_,_,_,B, B, _,_,_,_,_,_,_],
    [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
];

const groundTile = [
    [K,K,K,K,K,K,K,K],
    [K,W2,_,_,K,_,W2,K],
    [K,_,_,_,_,_,_,K],
    [D,D,D,D,D,D,D,D],
];

const brickObj = [
    [O,O,O,O,O,O,O,O],
    [O,W2,W2,O,O,W2,W2,O],
    [O,W2,_,O,O,_,W2,O],
    [R,R,R,R,R,R,R,R],
    [R,W2,_,R,R,_,W2,R],
    [D,D,D,D,D,D,D,D],
];

function drawPixelGrid(grid, offX, offY, scale) {
    for (let row = 0; row < grid.length; row++) {
        for (let col = 0; col < grid[row].length; col++) {
            const c = grid[row][col];
            if (c) {
                pctx.fillStyle = c;
                pctx.fillRect(offX + col * scale, offY + row * scale, scale, scale);
            }
        }
    }
}

let runnerX = -80;
const runnerY = pc.height - 12 * PX - 4 * PX - 4;
const runnerSpeed = 2.4;
let frame = 0;
let frameTimer = 0;
const frameDur = 8;

let groundOffset = 0;
const groundSpeed = runnerSpeed;

const obstacles = [];
let obstTimer = 120;

function spawnObstacle() {
    obstacles.push({ x: W + 20, y: pc.height - 6 * PX - 4 * PX - 4 });
}

let lastTime = 0;
function animLoop(ts) {
    if (!lastTime) lastTime = ts;
    lastTime = ts;

    pctx.clearRect(0, 0, pc.width, pc.height);

    groundOffset = (groundOffset + groundSpeed) % (8 * PX);
    const groundY = pc.height - 4 * PX - 4;
    const tileCols = Math.ceil(pc.width / (8 * PX)) + 2;
    for (let i = 0; i < tileCols; i++) {
        const gx = i * 8 * PX - groundOffset;
        drawPixelGrid(groundTile, gx, groundY, PX);
    }

    obstTimer--;
    if (obstTimer <= 0) {
        spawnObstacle();
        obstTimer = 120 + Math.floor(Math.random() * 100);
    }
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= groundSpeed;
        drawPixelGrid(brickObj, obstacles[i].x, obstacles[i].y, PX);
        if (obstacles[i].x < -80) obstacles.splice(i, 1);
    }

    runnerX += runnerSpeed;
    if (runnerX > W * 0.3) runnerX = W * 0.3;

    frameTimer++;
    if (frameTimer >= frameDur) { frame = (frame + 1) % 2; frameTimer = 0; }
    const sprite = frame === 0 ? frame1 : frame2;
    drawPixelGrid(sprite, runnerX, runnerY, PX);

    const fade = pctx.createLinearGradient(0, 0, 80, 0);
    fade.addColorStop(0, '#0a0a0b');
    fade.addColorStop(1, 'transparent');
    pctx.fillStyle = fade;
    pctx.fillRect(0, 0, 80, pc.height);

    const fadeR = pctx.createLinearGradient(W - 80, 0, W, 0);
    fadeR.addColorStop(0, 'transparent');
    fadeR.addColorStop(1, '#0a0a0b');
    pctx.fillStyle = fadeR;
    pctx.fillRect(W - 80, 0, 80, pc.height);

    requestAnimationFrame(animLoop);
}
requestAnimationFrame(animLoop);

const creditsOverlay = document.getElementById('credits-overlay');

document.getElementById('btn-play').addEventListener('click', () => {
    document.body.style.transition = 'opacity 0.6s';
    document.body.style.opacity = '0';
    setTimeout(() => {
        window.location.href = 'game.html';
        document.body.style.opacity = '1';
    }, 600);
});

document.getElementById('btn-credits').addEventListener('click', () => {
    creditsOverlay.classList.add('visible');
});

document.getElementById('close-credits').addEventListener('click', () => {
    creditsOverlay.classList.remove('visible');
});

document.getElementById('credits-backdrop').addEventListener('click', () => {
    creditsOverlay.classList.remove('visible');
});

document.getElementById('btn-quit').addEventListener('click', () => {
    window.close();
});

window.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-play').click();
    if (e.key === 'c' || e.key === 'C') document.getElementById('btn-credits').click();
    if (e.key === 'Escape') creditsOverlay.classList.remove('visible');
});

document.querySelectorAll('.menu-item').forEach(btn => {
    btn.addEventListener('mouseenter', () => {
        document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    });
});
</script>
</body>
